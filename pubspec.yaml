name: road_safety_sos
description: "Autonomous Road Safety & SOS Emergency Response System"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  google_fonts: ^6.1.0
  url_launcher: ^6.2.1
  flutter_svg: ^2.0.9
  http: ^1.2.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/maps/
    - assets/data/
